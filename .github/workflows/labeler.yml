name: PR Labeler

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  # ---------------------------------------------------------------------------
  # Auto-label PRs based on which files were changed
  # ---------------------------------------------------------------------------
  path-labeler:
    name: Label by Path
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/labeler@v6
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          sync-labels: true

  # ---------------------------------------------------------------------------
  # Auto-label PRs by size (lines changed)
  # ---------------------------------------------------------------------------
  size-labeler:
    name: Label by Size
    runs-on: ubuntu-latest
    steps:
      - uses: codelytv/pr-size-labeler@v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          xs_label: "size: xs"
          xs_max_size: 9
          s_label: "size: s"
          s_max_size: 49
          m_label: "size: m"
          m_max_size: 199
          l_label: "size: l"
          l_max_size: 499
          xl_label: "size: xl"
          fail_if_xl: false
          message_if_xl: >
            ⚠️ This PR is extra large (500+ lines changed). Consider splitting
            it into smaller, more focused pull requests for easier review.
          files_to_ignore: |
            Cargo.lock
