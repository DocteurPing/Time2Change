[workspace]
members = [
    "crates/domain",
    "crates/application",
    "crates/infrastructure",
    "crates/api",
    "crates/ingestion",
    "crates/shared",
]

resolver = "2"

[workspace.dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
thiserror = "2"
tracing = "0"
chrono = "0"
rust_decimal = { version = "1", default-features = false, features = ["maths", "macros"] }
async-trait = "0"

[workspace.package]
version = "0.1.0"
edition = "2024"
