# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
]
all-features = true

# --------------------------------------------------------------------------- #
# Advisories – check for known vulnerabilities and unmaintained crates
# --------------------------------------------------------------------------- #
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = []

# --------------------------------------------------------------------------- #
# Licenses – only allow known-good OSS licenses
# --------------------------------------------------------------------------- #
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Unicode-3.0",
    "ISC",
    "Zlib",
    "BSD-3-Clause",
    "CDLA-Permissive-2.0"
]
confidence-threshold = 0.8
private = { ignore = true }

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]


# --------------------------------------------------------------------------- #
# Bans – deny duplicate versions and specific unwanted crates
# --------------------------------------------------------------------------- #
[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

deny = [
    # Use rustls instead of openssl bindings for TLS
    # Uncomment if you want to enforce this:
    # { name = "openssl-sys", wrappers = [] },
]

skip = []
skip-tree = []

# --------------------------------------------------------------------------- #
# Sources – only allow crates from known registries / trusted orgs
# --------------------------------------------------------------------------- #
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
