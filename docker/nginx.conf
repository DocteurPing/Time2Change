server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Compression ────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/css
        text/javascript
        text/plain
        application/javascript
        application/wasm
        application/json
        image/svg+xml
        font/woff2;

    # ── Security headers ───────────────────────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"                    always;
    add_header X-Content-Type-Options   "nosniff"                       always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "geolocation=(), camera=()"     always;

    # ── API reverse proxy ──────────────────────────────────────────────────
    # All backend routes are proxied to the api service on the internal
    # Docker network.  The frontend WASM calls the same origin (port 80)
    # so no CORS preflight is needed and the backend port is never exposed.
    location ~ ^/(currencies|analyze|health)(/.*)?$ {
        proxy_pass         http://api:8080;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_connect_timeout 5s;
    }

    # ── Hashed static assets (JS, WASM, CSS) ───────────────────────────────
    # Trunk appends a content hash to every filename, so these can be cached
    # for a very long time.
    location ~* \.(wasm|js|css|png|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── SPA entry point ────────────────────────────────────────────────────
    # index.html itself must never be cached so the browser always fetches
    # the latest version and gets the new hashed asset filenames.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store";
    }
}
